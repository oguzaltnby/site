[build]
  functions = "netlify/functions"
  publish = "dist"
  node_version = "18.20.5"  # Node.js sürümünü güncelleyin
command = "rm -rf node_modules package-lock.json && npm install --omit=optional && nuxt generate"

[dev]
  command = "npm run dev"
  port = 3000

[functions]
  included_files = ["netlify/functions/files/**"]
